<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vassago Lead Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Vassago Lead Engine</h1>
            <div class="stats-card">
                <span class="stats-label">Total Leads:</span>
                <span id="total-leads">0</span>
            </div>
        </header>

        <section class="control-panel">
            <input type="text" id="keyword-input" placeholder="e.g., Digital Agency in Jakarta">
            <button id="scan-btn">Start Scan</button>
        </section>

        <div id="status-area" class="hidden">
            <div class="spinner"></div>
            <span id="status-text">Crawler is running... this may take a minute</span>
        </div>

        <section class="data-section">
            <table id="leads-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Company Name</th>
                        <th>Contact Email</th>
                        <th>Website URL</th>
                        <th>Scraped At</th>
                    </tr>
                </thead>
                <tbody id="leads-body">
                    <!-- Data populated here -->
                </tbody>
            </table>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
